  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- dumbbell, centred on x=256 -->
  <g fill="url(#bar)">
    <rect x="104" y="206" width="32" height="100" rx="10"/>
    <rect x="148" y="181" width="34" height="150" rx="12"/>
    <rect x="182" y="239" width="148" height="34" rx="9"/>
    <rect x="330" y="181" width="34" height="150" rx="12"/>
    <rect x="376" y="206" width="32" height="100" rx="10"/>
  </g>
</svg>
