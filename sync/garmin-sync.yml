# Ironlog Garmin sync — place at .github/workflows/garmin-sync.yml in your
# PRIVATE sync repo (see sync/README.md for full setup).
name: Garmin sync

on:
  schedule:
    # Six spread attempts a day at an odd minute. Garmin 429s are tied to the
    # runner's IP and each run draws a fresh IP, so more runs = more lottery
    # tickets; the script fails fast (~3 min max) and skips green on 429, so
    # persistent rate-limiting costs little and any one success lands the
    # day's data in sync.json.
    - cron: '7 1,5,9,13,17,21 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Fetch full activity history (run once after setup)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Sync from Garmin
        env:
          GARTH_TOKEN: ${{ secrets.GARTH_TOKEN }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python garmin_sync.py backfill --out data/sync.json
          else
            python garmin_sync.py sync --out data/sync.json
          fi

      - name: Commit if changed
        run: |
          git config user.name 'ironlog-sync'
          git config user.email 'sync@users.noreply.github.com'
          git add data/sync.json
          git diff --cached --quiet || git commit -m "garmin sync $(date -u +%FT%TZ)"
          git push
